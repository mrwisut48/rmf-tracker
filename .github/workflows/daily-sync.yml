name: Daily RMF Sync

on:

  schedule:
    - cron: '0 1 * * *'

  workflow_dispatch:

jobs:

  sync:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Create ENV File
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env

      - name: Scrape RMF
        run: node src/scraper/scrape-rmf.js

      - name: Extract RMF
        run: node src/scraper/extract-rmf.js

      - name: Import RMF
        run: node src/import/import-funds-reset.js